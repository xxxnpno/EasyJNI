name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All supported Java versions.  Update when a new release ships from Adoptium.
# Java 8 is the oldest HotSpot vmhook still supports; the latest entry tracks
# the newest GA build that Temurin publishes.
env:
  JAVA_VERSIONS: '["8","11","17","21","24","25"]'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Build matrix: every supported {OS × compiler} combination must compile
  #    the header, the example shared library, the injector (Windows only),
  #    and the unit-test suite — then run the unit tests with no JVM.
  # ─────────────────────────────────────────────────────────────────────────
  build-and-unit-test:
    name: build · ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "windows / msvc",   os: windows-latest, cc: cl,    cxx: cl,      generator: "Ninja" }
          - { label: "windows / clang",  os: windows-latest, cc: clang, cxx: clang++, generator: "Ninja" }
          - { label: "windows / mingw",  os: windows-latest, cc: gcc,   cxx: g++,     generator: "Ninja" }
          - { label: "linux   / gcc",    os: ubuntu-latest,  cc: gcc,   cxx: g++,     generator: "Ninja" }
          - { label: "linux   / clang",  os: ubuntu-latest,  cc: clang, cxx: clang++, generator: "Ninja" }
          - { label: "macos   / clang",  os: macos-latest,   cc: clang, cxx: clang++, generator: "Ninja" }

    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5

      # ── Linux toolchains ────────────────────────────────────────────────
      # GCC 14+ and Clang 18+ ship the C++23 deducing-this feature that the
      # header uses to make `get_field("name")` work in both static and
      # instance contexts.  We pin those versions so CI matches the
      # documented minimum.
      - name: Install GCC 14 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.cc == 'gcc'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Install Clang 18 (Linux)
        if: matrix.os == 'ubuntu-latest' && matrix.cc == 'clang'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y clang-18 libstdc++-14-dev
          echo "CC=clang-18"   >> "$GITHUB_ENV"
          echo "CXX=clang++-18" >> "$GITHUB_ENV"

      # ── macOS toolchain (system clang) ──────────────────────────────────
      - name: Pick Xcode (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app
          clang --version

      # ── Windows MSVC / clang-cl / MinGW ─────────────────────────────────
      - name: Set up MSVC dev cmd
        if: matrix.os == 'windows-latest' && matrix.cc == 'cl'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up MSVC dev cmd for clang
        if: matrix.os == 'windows-latest' && matrix.cc == 'clang'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install LLVM (Windows / clang)
        if: matrix.os == 'windows-latest' && matrix.cc == 'clang'
        uses: KyleMayes/install-llvm-action@v2
        with:
          # MSVC's STL requires Clang 19+ (yvals_core.h enforces STL1000).
          # Bumping to 19 also gives us full C++23 deducing-this support.
          version: "19.1"

      - name: Export Clang env (Windows)
        if: matrix.os == 'windows-latest' && matrix.cc == 'clang'
        shell: pwsh
        run: |
          echo "CC=clang"    >> $env:GITHUB_ENV
          echo "CXX=clang++" >> $env:GITHUB_ENV

      - name: Install MSYS2 (Windows MinGW)
        if: matrix.os == 'windows-latest' && matrix.cc == 'gcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      # ── Build + test ────────────────────────────────────────────────────
      - name: Configure, build, test (non-MSYS2)
        if: matrix.cc != 'gcc' || matrix.os != 'windows-latest'
        run: |
          cmake -S . -B build -G "${{ matrix.generator }}" -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --parallel
          ctest --test-dir build --output-on-failure -C Release

      - name: Configure, build, test (MSYS2 MinGW)
        if: matrix.os == 'windows-latest' && matrix.cc == 'gcc'
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      # ── Upload built artefacts so the JVM jobs can reuse them ──────────
      - name: Upload artefacts (Windows MSVC)
        if: matrix.os == 'windows-latest' && matrix.cc == 'cl'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-windows-msvc
          path: |
            build/bin/vmhook.dll
            build/bin/vmhook.pdb
            build/bin/injector.exe
            build/bin/injector.pdb

      - name: Upload artefacts (Windows clang)
        if: matrix.os == 'windows-latest' && matrix.cc == 'clang'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-windows-clang
          path: |
            build/bin/vmhook.dll
            build/bin/injector.exe

      - name: Upload artefacts (Windows MinGW)
        if: matrix.os == 'windows-latest' && matrix.cc == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-windows-mingw
          path: |
            build/bin/vmhook.dll
            build/bin/injector.exe

      - name: Upload artefacts (Linux gcc)
        if: matrix.os == 'ubuntu-latest' && matrix.cc == 'gcc'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-linux-gcc
          path: build/bin/libvmhook.so

      - name: Upload artefacts (Linux clang)
        if: matrix.os == 'ubuntu-latest' && matrix.cc == 'clang'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-linux-clang
          path: build/bin/libvmhook.so

      - name: Upload artefacts (macOS clang)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-macos-clang
          # CMake's MODULE library uses the platform-default suffix; on
          # Apple platforms that is .dylib (.bundle is also possible if
          # we tweak SUFFIX in CMakeLists.txt, but the default suits us).
          path: |
            build/bin/libvmhook.dylib
            build/bin/libvmhook.so

  # ─────────────────────────────────────────────────────────────────────────
  # 2. JVM integration tests — every Java version × every compiler that
  #    produces a usable artefact on a runner.  Three OSes (Windows, Linux,
  #    macOS) participate.
  # ─────────────────────────────────────────────────────────────────────────
  java-versions:
    name: enumerate Java versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set.outputs.versions }}
    steps:
      - id: set
        run: echo "versions=${{ env.JAVA_VERSIONS }}" >> "$GITHUB_OUTPUT"

  jvm-windows:
    name: jvm · windows · ${{ matrix.compiler }} · java ${{ matrix.java }}
    needs: [build-and-unit-test, java-versions]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [msvc, clang, mingw]
        java:     ${{ fromJson(needs.java-versions.outputs.versions) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artefact
        uses: actions/download-artifact@v4
        with:
          name: vmhook-windows-${{ matrix.compiler }}
          path: build/bin

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Compile Java fixtures
        shell: cmd
        run: |
          mkdir out 2>nul || ver >nul
          javac -d out example\vmhook\*.java

      - name: Run injection-based integration test
        shell: pwsh
        run: |
          Write-Host "=== Java ${{ matrix.java }} · Windows / ${{ matrix.compiler }} ==="

          $java = Start-Process `
            -FilePath "java" `
            -ArgumentList "-cp", "out", "vmhook.Main" `
            -PassThru -WindowStyle Hidden `
            -RedirectStandardOutput "java_stdout.txt" `
            -RedirectStandardError  "java_stderr.txt"
          Write-Host "Started java.exe (PID $($java.Id))"

          Start-Sleep -Seconds 5

          $inject = Start-Process -FilePath "build\bin\injector.exe" `
                                  -PassThru -Wait -WindowStyle Hidden
          Write-Host "injector.exe exit=$($inject.ExitCode)"

          if ($inject.ExitCode -ne 0) {
            Stop-Process -Id $java.Id -Force -ErrorAction SilentlyContinue
            Write-Error "Injection failed"
            exit 1
          }

          if (-not $java.WaitForExit(60000)) {
            Stop-Process -Id $java.Id -Force -ErrorAction SilentlyContinue
            Write-Host "::warning::java.exe did not exit within 60 s; dumping diagnostics before failing"
            if (Test-Path "java_stdout.txt") { Write-Host "--- java_stdout.txt ---"; Get-Content "java_stdout.txt" | ForEach-Object { Write-Host $_ } }
            if (Test-Path "java_stderr.txt") { Write-Host "--- java_stderr.txt ---"; Get-Content "java_stderr.txt" | ForEach-Object { Write-Host "[stderr] $_" } }
            if (Test-Path "test_results.txt") { Write-Host "--- test_results.txt (partial) ---"; Get-Content "test_results.txt" | ForEach-Object { Write-Host $_ } }
            Write-Error "java.exe did not exit within 60 s"
            exit 1
          }

          if (Test-Path "java_stdout.txt") { Get-Content "java_stdout.txt" | ForEach-Object { Write-Host $_ } }
          if (Test-Path "java_stderr.txt") { $e = Get-Content "java_stderr.txt"; if ($e) { $e | ForEach-Object { Write-Host "[stderr] $_" } } }

          # test_results.txt is authoritative.  Some builds (notably MinGW)
          # leave the JVM in a non-zero exit state on the way out (SEH /
          # personality routine mismatch) even though every test passed —
          # we only treat that as a failure when the results file is
          # missing or contains FAILs.
          if (-not (Test-Path "test_results.txt")) {
            Write-Error "test_results.txt was not created by the test DLL"
            Write-Error "java.exe exited with code $($java.ExitCode)"
            exit 1
          }
          $results = Get-Content "test_results.txt"
          $results | ForEach-Object { Write-Host $_ }
          $fail = $results | Where-Object { $_ -match '^\[FAIL\]' }
          if ($fail) {
            Write-Error "$($fail.Count) FAIL line(s) in test_results.txt"
            exit 1
          }
          if ($java.ExitCode -ne 0) {
            Write-Host "::warning::java.exe exit=$($java.ExitCode) on the way out, but all tests in test_results.txt passed"
          }
          Write-Host "Java ${{ matrix.java }} / ${{ matrix.compiler }}: ALL PASS"

  jvm-linux:
    name: jvm · linux · ${{ matrix.compiler }} · java ${{ matrix.java }}
    needs: [build-and-unit-test, java-versions]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        java:     ${{ fromJson(needs.java-versions.outputs.versions) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artefact
        uses: actions/download-artifact@v4
        with:
          name: vmhook-linux-${{ matrix.compiler }}
          path: build/bin

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Compile Java fixtures
        run: |
          mkdir -p out
          javac -d out example/vmhook/*.java

      - name: Run JNI integration test
        env:
          LD_LIBRARY_PATH: build/bin
        run: |
          set -euo pipefail
          echo "=== Java ${{ matrix.java }} · Linux / ${{ matrix.compiler }} ==="
          chmod +x build/bin/libvmhook.so
          # Launch java with the shared library on the load path; the loader
          # constructor in libvmhook.so will start the test worker thread.
          java -cp out -Djava.library.path=build/bin vmhook.Main &
          JAVA_PID=$!

          # Trigger load explicitly via JVMTI agent attach.
          sleep 3
          if command -v jcmd >/dev/null 2>&1; then
            jcmd "$JAVA_PID" JVMTI.agent_load build/bin/libvmhook.so || true
          fi

          waited=0
          while kill -0 "$JAVA_PID" 2>/dev/null && [ "$waited" -lt 90 ]; do
            sleep 1
            waited=$((waited + 1))
          done
          if kill -0 "$JAVA_PID" 2>/dev/null; then
            kill -9 "$JAVA_PID" || true
          fi

          if [ ! -f test_results.txt ]; then
            echo "::warning::test_results.txt missing — Linux runtime integration is best-effort"
            exit 0
          fi
          cat test_results.txt
          if grep -q '^\[FAIL\]' test_results.txt; then
            echo "::error::FAIL lines detected"
            grep '^\[FAIL\]' test_results.txt
            exit 1
          fi
          echo "Java ${{ matrix.java }} / ${{ matrix.compiler }}: ALL PASS"

  jvm-macos:
    name: jvm · macos · clang · java ${{ matrix.java }}
    needs: [build-and-unit-test, java-versions]
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        java: ${{ fromJson(needs.java-versions.outputs.versions) }}
        # Temurin does not publish a Java 8 build for macOS arm64 (Apple
        # Silicon), which is what the GitHub-hosted macOS runners are.
        exclude:
          - java: '8'

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artefact
        uses: actions/download-artifact@v4
        with:
          name: vmhook-macos-clang
          path: build/bin

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Compile Java fixtures
        run: |
          mkdir -p out
          javac -d out example/vmhook/*.java

      - name: Run JNI integration test (best-effort)
        run: |
          set -euo pipefail
          echo "=== Java ${{ matrix.java }} · macOS / clang ==="
          chmod +x build/bin/libvmhook.dylib build/bin/libvmhook.so 2>/dev/null || true
          # System.loadLibrary needs `lib<name>.dylib` on macOS but our
          # CMake configuration may emit either suffix depending on the
          # generator.  Symlink one to the other so the search path
          # works regardless.
          if [ -f build/bin/libvmhook.dylib ] && [ ! -f build/bin/libvmhook.so ]; then
            ln -s libvmhook.dylib build/bin/libvmhook.so
          fi
          if [ -f build/bin/libvmhook.so ] && [ ! -f build/bin/libvmhook.dylib ]; then
            ln -s libvmhook.so build/bin/libvmhook.dylib
          fi
          # macOS runners ship Apple Silicon (arm64); HotSpot is present but
          # the vmhook trampoline is x86_64 only, so the runtime hook step
          # will degrade gracefully.  We still exercise the OS layer and
          # the JNI_OnLoad entrypoint.
          DYLD_LIBRARY_PATH=build/bin java -cp out -Djava.library.path=build/bin vmhook.Main &
          JAVA_PID=$!
          sleep 3
          waited=0
          while kill -0 "$JAVA_PID" 2>/dev/null && [ "$waited" -lt 60 ]; do
            sleep 1
            waited=$((waited + 1))
          done
          if kill -0 "$JAVA_PID" 2>/dev/null; then
            kill -9 "$JAVA_PID" || true
          fi
          if [ -f test_results.txt ]; then
            cat test_results.txt
          else
            echo "::warning::test_results.txt missing — macOS runtime hooking is arm64-limited"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Mobile cross-compile jobs (build-only).  iOS and Android do not ship
  #    HotSpot, so runtime hooking is unreachable there; we still ensure
  #    the header and tests compile cleanly under their toolchains.
  # ─────────────────────────────────────────────────────────────────────────
  android-build:
    name: android cross-compile (NDK · ${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Locate NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> "$GITHUB_ENV"
      - name: Configure + build (Android ${{ matrix.abi }})
        run: |
          cmake -S . -B build-android-${{ matrix.abi }} -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release \
            -DVMHOOK_BUILD_EXAMPLE=OFF \
            -DVMHOOK_BUILD_INJECTOR=OFF
          cmake --build build-android-${{ matrix.abi }} --parallel
      - name: Run host-runnable unit tests (only when ABI matches host)
        if: matrix.abi == 'x86_64'
        run: |
          # The Android NDK builds for an emulated target by default; we
          # can't execute on the runner.  Just confirm the binaries exist.
          ls -la build-android-${{ matrix.abi }}/tests/

  ios-build:
    name: ios cross-compile (xcode · ${{ matrix.sdk }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [iphoneos, iphonesimulator]
    steps:
      - uses: actions/checkout@v4
      - name: Configure + build (iOS ${{ matrix.sdk }})
        run: |
          case "${{ matrix.sdk }}" in
            iphoneos)         PLATFORM=OS64       ;;
            iphonesimulator)  PLATFORM=SIMULATOR64 ;;
          esac
          # Use CMake's built-in iOS toolchain handling.
          cmake -S . -B build-ios-${{ matrix.sdk }} -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=${{ matrix.sdk }} \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.3 \
            -DCMAKE_BUILD_TYPE=Release \
            -DVMHOOK_BUILD_EXAMPLE=OFF \
            -DVMHOOK_BUILD_INJECTOR=OFF \
            -DVMHOOK_BUILD_TESTS=ON
          cmake --build build-ios-${{ matrix.sdk }} --config Release

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Strict warnings-as-errors build on the primary Linux compilers.
  # ─────────────────────────────────────────────────────────────────────────
  warnings-as-errors:
    name: warnings-as-errors (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "linux / gcc",   os: ubuntu-latest, cxx: g++-14 }
          - { label: "linux / clang", os: ubuntu-latest, cxx: clang++-18 }
    steps:
      - uses: actions/checkout@v4
      - uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Install GCC 14 + libstdc++-14
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14 libstdc++-14-dev
      - name: Install Clang 18
        if: contains(matrix.cxx, 'clang')
        run: |
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/llvm.asc
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y clang-18
      - name: Configure + build + test with -Werror
        env:
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DVMHOOK_WARNINGS_AS_ERRORS=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Legacy MSBuild build of the historic vmhook.slnx — kept so existing
  #    Visual Studio consumers still get CI coverage.
  # ─────────────────────────────────────────────────────────────────────────
  msbuild-solution:
    name: legacy msbuild (vmhook.slnx)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
      - name: Build solution
        shell: cmd
        # The vcxproj files default to PlatformToolset=v145 (the VS Insider
        # build the project was developed against).  GitHub-hosted runners
        # ship the stable v143 toolset; we override at MSBuild invocation
        # time so the same vcxproj works in both environments.
        run: msbuild vmhook.slnx /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
