name: Unit Tests

on:
  push:
    branches: ["testing"]
  pull_request:
    branches: ["testing"]
  workflow_dispatch:

jobs:
  windows-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build VMHook (Release|x64)
        run: msbuild VMHook/VMHook.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m /nologo

      - name: Build Injector (Release|x64)
        run: msbuild Injector/Injector.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m /nologo

      - name: Run integration unit tests
        shell: pwsh
        run: ./example/ci_run_tests.ps1
