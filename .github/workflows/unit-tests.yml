name: Unit Tests

on:
  push:
    branches: ["testing"]
  pull_request:
    branches: ["testing"]
  workflow_dispatch:

jobs:
  windows-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build VMHook (Release|x64)
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild VMHook/VMHook.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m /nologo

      - name: Build Injector (Release|x64)
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild Injector/Injector.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Build /m /nologo

      - name: Run integration unit tests
        shell: pwsh
        run: ./example/ci_run_tests.ps1
