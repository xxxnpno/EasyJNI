name: Unit Tests

on:
  push:
    branches: ["testing"]
  pull_request:
    branches: ["testing"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build VMHook (Release|x64)
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild VMHook/VMHook.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /t:Build /m /nologo

      - name: Build Injector (Release|x64)
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          & $msbuild Injector/Injector.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /t:Build /m /nologo

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vmhook-build
          path: build/

  test:
    needs: build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        java: [8, 11, 17, 21, 25, 26]

    name: "JDK ${{ matrix.java }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: vmhook-build
          path: build/

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ matrix.java }}"

      - name: Disable Windows Defender real-time monitoring
        shell: pwsh
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      - name: Run tests (JDK ${{ matrix.java }})
        shell: pwsh
        run: ./example/ci_run_tests.ps1 -JavaMajor ${{ matrix.java }}
