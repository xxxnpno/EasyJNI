name: Feature request
description: Suggest a new vmhook capability or an API change.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: What problem does this solve?
      description: Concrete use case — what are you trying to do that vmhook can't currently do (or can only do awkwardly)?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
      description: Sketch of the API you'd want.  Pseudo-code is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about, and why they don't work as well.
