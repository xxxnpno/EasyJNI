name: Bug report
description: Something doesn't work the way the README / header docs say it should.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report.  Please include enough information for someone
        else to reproduce.  Crash reports without a reproducer rarely turn into fixes.

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Concise description of the observed vs expected behaviour.
      placeholder: e.g. "vmhook::hook<X>(\"foo\") returns false on Temurin 21 even though X.foo exists."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Minimal Java fixture + C++ snippet + the command line you used.  Code blocks render fine in fenced ``` blocks.
    validations:
      required: true

  - type: input
    id: jvm
    attributes:
      label: JVM build
      description: Vendor + version (e.g. "Temurin 21.0.10 x64", "Corretto 17.0.7 aarch64").
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Host OS
      options:
        - Windows 10/11 x64
        - Linux x86_64
        - macOS x86_64 (Intel)
        - macOS arm64 (Apple Silicon)
        - Android
        - iOS
        - Other (specify in "What happened")
    validations:
      required: true

  - type: dropdown
    id: compiler
    attributes:
      label: Compiler
      options:
        - MSVC
        - clang
        - clang-cl
        - GCC / MinGW-w64
        - Other (specify)
    validations:
      required: true

  - type: input
    id: vmhook-version
    attributes:
      label: vmhook version
      description: Output of `VMHOOK_VERSION_STRING` or the git commit if newer than the latest release.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (with VMHOOK_DEBUG_LOGS=1)
      description: Paste any `[VMHook INFO]` / `[VMHook ERROR]` lines you saw.  Build with `-DVMHOOK_DEBUG_LOGS=1` to enable them in a release build.
      render: text
